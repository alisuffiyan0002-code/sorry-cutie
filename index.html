<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorry Love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffd6e7, #fff0f5, #ffe4ec);
      position: relative;
    }

    .container {
      width: 90%;
      max-width: 500px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(10px);
      border-radius: 25px;
      padding: 30px 20px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      z-index: 2;
      animation: popIn 0.6s ease;
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.85);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    h1 {
      color: #ff4d6d;
      margin-bottom: 12px;
      font-size: 2rem;
    }

    .emoji {
      font-size: 58px;
      margin-bottom: 10px;
      animation: bounce 1.6s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .typing-box {
      min-height: 110px;
      background: #fff;
      padding: 15px;
      border-radius: 16px;
      line-height: 1.7;
      color: #444;
      font-size: 1rem;
      text-align: left;
      margin: 18px 0;
      box-shadow: inset 0 0 0 1px rgba(255, 77, 109, 0.12);
    }

    .question {
      font-size: 1.2rem;
      color: #ff4d6d;
      font-weight: bold;
      margin: 18px 0 20px;
    }

    .btn-area {
      position: relative;
      width: 100%;
      height: 160px;
    }

    button {
      border: none;
      outline: none;
      padding: 13px 22px;
      border-radius: 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12);
    }

    .yes-btn {
      background: #ff4d6d;
      color: white;
      position: absolute;
      left: 32%;
      top: 20px;
    }

    .yes-btn:hover {
      transform: scale(1.06);
    }

    .no-btn {
      background: white;
      color: #ff4d6d;
      position: absolute;
      left: 55%;
      top: 20px;
    }

    .music-btn, .restart-btn {
      background: white;
      color: #ff4d6d;
      margin-top: 8px;
    }

    .hidden {
      display: none;
    }

    .final-screen h2 {
      color: #ff4d6d;
      font-size: 2rem;
      margin-bottom: 12px;
    }

    .final-screen p {
      color: #444;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .big-heart {
      font-size: 70px;
      animation: pulse 1.2s infinite;
      display: inline-block;
      margin-bottom: 10px;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .heart {
      position: absolute;
      bottom: -30px;
      font-size: 24px;
      color: rgba(255, 77, 109, 0.55);
      animation: floatUp linear forwards;
      pointer-events: none;
      user-select: none;
    }

    @keyframes floatUp {
      to {
        transform: translateY(-115vh) rotate(360deg);
        opacity: 0;
      }
    }

    .small-note {
      font-size: 0.9rem;
      color: #777;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div id="page1">
      <div class="emoji">🥺</div>
      <h1>I’m Really Sorry</h1>

      <div class="typing-box" id="typingText"></div>

      <button class="music-btn" onclick="toggleMusic()">🎵 Music On / Off</button>

      <div class="question">Will you forgive me?</div>

      <div class="btn-area" id="btnArea">
        <button class="yes-btn" onclick="showFinal()">Yes 💖</button>
        <button class="no-btn" id="noBtn">No 😶</button>
      </div>

      <div class="small-note">No pe click karke dekh lo 😭</div>
    </div>

    <div id="page2" class="hidden final-screen">
      <div class="big-heart">❤️</div>
      <h2>Thank Youuu 🫶</h2>
      <p>
        Thank you for giving me one more chance.<br>
        I know I made mistakes, but you really mean a lot to me.
      </p>
      <p><b>I love you so much 💌</b></p>
      <button class="restart-btn" onclick="location.reload()">Again ✨</button>
    </div>
  </div>

  <audio id="bgMusic" loop>
    <source src="your-music.mp3" type="audio/mpeg">
  </audio>

  <script>
    const message = `I know I hurt you...
And I’m truly sorry for that.

I never wanted to make you feel bad.
Please give me one chance to make things right again.`;

    const typingText = document.getElementById("typingText");
    let i = 0;

    function typeEffect() {
      if (i < message.length) {
        typingText.innerHTML += message.charAt(i) === "\n" ? "<br>" : message.charAt(i);
        i++;
        setTimeout(typeEffect, 45);
      }
    }

    typeEffect();

    const noBtn = document.getElementById("noBtn");
    const btnArea = document.getElementById("btnArea");

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);

    function moveNoButton() {
      const areaWidth = btnArea.clientWidth - noBtn.offsetWidth;
      const areaHeight = btnArea.clientHeight - noBtn.offsetHeight;

      const randomX = Math.floor(Math.random() * areaWidth);
      const randomY = Math.floor(Math.random() * areaHeight);

      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function showFinal() {
      document.getElementById("page1").classList.add("hidden");
      document.getElementById("page2").classList.remove("hidden");
    }

    function toggleMusic() {
      const music = document.getElementById("bgMusic");
      if (music.paused) {
        music.play();
      } else {
        music.pause();
      }
    }

    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (3 + Math.random() * 3) + "s";
      heart.style.fontSize = (18 + Math.random() * 20) + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 350);
  </script>

</body>
</html>
